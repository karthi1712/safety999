<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <body>
<link rel="stylesheet" href="styles.css">

<div class="nav"><h3>Feed</h3></div>

<div class="container">
<h2>Incident Feed</h2>
<div class="grid" id="feed"></div>
</div>

<script>
fetch("http://localhost:5000/api/incidents")
.then(r=>r.json())
.then(d=>{
 feed.innerHTML=d.map(i=>`
  <div class="card">
   <h3>${i.title}</h3>
   <p>${i.description||""}</p>
  </div>`).join("")
})
</script>
</body>
</body>
</html>

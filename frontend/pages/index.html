<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Safe | Incident Awareness</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <style>
        :root {
            --accent: #6366f1; /* The purple/blue from your button */
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Nav Glassmorphism */
        .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 8%;
        background: rgba(11, 14, 20, 0.9);
        backdrop-filter: blur(15px);
        position: fixed;
        width: 84%;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-links { display: flex; align-items: center; }
    
    .nav-links a { 
        color: #94a3b8; 
        text-decoration: none; 
        margin-left: 25px; 
        font-size: 0.95rem;
        font-weight: 500;
        transition: 0.3s; 
    }
    
    .nav-links a:hover { color: #818cf8; }

    /* Dropdown for Secondary Items */
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { 
        background: #1e293b; 
        color: white; 
        padding: 8px 15px; 
        border-radius: 8px; 
        margin-left: 20px; 
        cursor: pointer; 
        border: 1px solid #334155;
    }
    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        background-color: #161b22;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
        border-radius: 8px;
        z-index: 1;
        margin-top: 10px;
    }
    .dropdown-content a { color: #94a3b8; padding: 12px 16px; display: block; margin: 0; }
    .dropdown-content a:hover { background: #21262d; color: white; }
    .dropdown:hover .dropdown-content { display: block; }
        /* Hero Section */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0e14 100%);
            padding-top: 60px;
        }

        .hero h1 { font-size: 5rem; margin: 0; font-weight: 800; }
        .hero p { color: #94a3b8; font-size: 1.2rem; margin: 20px 0 40px; }

        /* Pulse Animation for Video */
        .pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 rgba(239, 68, 68, 0.4);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Buttons */
        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .primary { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; border: none; }
        .secondary { border: 1px solid #334155; color: white; margin-left: 15px; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* Incident Feed Area */
        .container { padding: 80px 8%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--accent); background: #1c2128; }
        .card h3 { margin-top: 0; color: #e6edf3; }
        .card p { color: #8b949e; line-height: 1.5; }
        .sos-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #ff4b2b, #ff0000);
    color: white;
    border: none;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    font-weight: 900;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(255, 0, 0, 0.4);
    z-index: 9999; /* Keeps it above everything else */
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-sos 2s infinite;
}

.sos-btn:hover {
    transform: scale(1.1);
    background: #d40000;
}

@keyframes pulse-sos {
    0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
    70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
}
    </style>
</head>
<body>
<button class="sos-btn" onclick="triggerSOS()">SOS</button>
<div class="nav">
    <h3 style="cursor:pointer" onclick="location.href='index.html'">Safety</h3>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="feed.html">Feed</a>
        <a href="dashboard.html">Dashboard</a>
        
        <div class="dropdown">
            <div class="dropbtn">More ▾</div>
            <div class="dropdown-content">
                <a href="admin.html">Admin Panel</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="resource.html">Resources</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
                <hr style="border: 0.5px solid #334155; margin: 5px 0;">
                <a href="settings.html">Settings</a>
                <a href="profile.html">My Profile</a>
                <a href="login.html" style="color: #ef4444;">Logout</a>
            </div>
        </div>
    </div>
</div>
<div class="hero">
    <h1>Stay Safe</h1>
    <p><span class="pulse"></span> Live incident awareness platform</p>
    <div>
        <a href="report.html" class="btn primary">Report Incident</a>
        <a href="map.html" class="btn secondary">Explore Map</a>
    </div>
</div>

<div class="container">
    <h2>Recent Alerts</h2>
    <div class="grid" id="data">
        <div class="card">
            <h3>System Status</h3>
            <p>Scanning for nearby reports...</p>
        </div>
    </div>
</div>

<script>
    // Connection to your backend
    fetch("http://localhost:5000/api/incidents")
    .then(res => res.json())
    .then(data => {
        const feed = document.getElementById('data');
        
        if(data && data.length > 0) {
            feed.innerHTML = data.map(item => {
                // FIX: Check if location is an object or a string to avoid [object Object]
                let locationDisplay = 'Reported Area';
                
                if (item.location) {
                    if (typeof item.location === 'object') {
                        // If it's an object, try to get the name property
                        locationDisplay = item.location.name || 'Location details available';
                    } else {
                        // If it's already a string, use it directly
                        locationDisplay = item.location;
                    }
                }

                return `
                <div class="card">
                    <h3>${item.title}</h3>
                    <p>${item.description || 'No description available for this incident.'}</p>
                    <div style="margin-top:15px; font-size:0.85rem; color:#818cf8; font-weight:bold;">
                        📍 ${locationDisplay}
                    </div>
                </div>
                `;
            }).join('');
        } else {
            feed.innerHTML = '<p style="color:#94a3b8; text-align:center; grid-column: 1/-1;">No active incidents in your area.</p>';
        }
    })
    .catch(err => {
        console.error("Backend offline:", err);
        const feed = document.getElementById('data');
        feed.innerHTML = `
            <div class="card" style="border-color: #ef4444; grid-column: 1/-1;">
                <h3 style="color:#ef4444">Connection Error</h3>
                <p>Unable to connect to the backend server. Please ensure your Node.js server is running on Port 5000.</p>
            </div>`;
    });
    function triggerSOS() {
    // 1. Visual feedback for the user
    alert("🚨 EMERGENCY SOS ACTIVATED!\n\nYour live location is being transmitted to the emergency response team.");
    
    // 2. Logic for your video explanation:
    // Mention that this sends a high-priority event via Socket.io
    console.log("SOS Event emitted to backend...");
    
    // If you want to actually send it to your backend later:
    /*
    fetch("http://localhost:5000/api/incidents", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            title: "EMERGENCY SOS",
            description: "User triggered emergency button",
            location: "Live GPS Coordinates"
        })
    });
    */
}
</script>

</body>
</html>

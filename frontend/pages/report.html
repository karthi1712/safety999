<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="styles.css"></head>
<body>

<div class="container">

<h2>Report Incident</h2>

<input id="title" placeholder="Title">
<textarea id="desc"></textarea>

<select id="severity">
<option>low</option>
<option>medium</option>
<option>high</option>
</select>

<p>Location:</p>
<button onclick="useCurrent()">Use Current Location</button>

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<button class="btn primary" onclick="submit()">Submit</button>

</div>

<script>
function useCurrent(){
navigator.geolocation.getCurrentPosition(pos=>{
  lat.value = pos.coords.latitude;
  lng.value = pos.coords.longitude;
});
}

async function submit(){
  await fetch("http://localhost:5000/api/incidents",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      title:title.value,
      description:desc.value,
      severity:severity.value,
      lat:parseFloat(lat.value),
      lng:parseFloat(lng.value)
    })
  });

  alert("Incident saved");
}
</script>

</body>
</html>
